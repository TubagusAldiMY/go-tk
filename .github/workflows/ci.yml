name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build:
    name: Build (multi-platform)
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o dist/go-tk-linux-amd64 ./cmd/go-tk/

      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o dist/go-tk-linux-arm64 ./cmd/go-tk/

      - name: Build macOS amd64
        run: GOOS=darwin GOARCH=amd64 go build -o dist/go-tk-darwin-amd64 ./cmd/go-tk/

      - name: Build macOS arm64
        run: GOOS=darwin GOARCH=arm64 go build -o dist/go-tk-darwin-arm64 ./cmd/go-tk/

      - name: Build Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -o dist/go-tk-windows-amd64.exe ./cmd/go-tk/

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
          retention-days: 7
