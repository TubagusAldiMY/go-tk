version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - revive
    - gosec
    - bodyclose
    - contextcheck
    - noctx
    - exhaustive

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
  gosec:
    excludes:
      - G304 # file inclusion — intentional in a code generator

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - errcheck
        - gosec
    - path: "templates/"
      linters:
        - all
